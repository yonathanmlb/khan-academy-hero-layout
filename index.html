<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Khan Academy Layout</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="navbar">
    <div class="nav-left">
      <a href="#" class="courses">Courses ▼</a>

      <div class="search-box">
        <input type="text" placeholder="Search" />
        <span class="search-icon">🔍</span>
      </div>
    </div>

    <div class="logo">
      <span class="logo-icon">⬡</span>
      <span class="logo-text">Khan Academy</span>
    </div>

    <div class="nav-right">
      <a href="#">Donate</a>
      <a href="#">Login</a>
      <a href="#" class="signup">Sign up</a>
    </div>
  </header>

  <main class="hero">
    <div class="hero-image">
      <div class="shape shape-blue"></div>
      <div class="shape shape-pink"></div>
      <div class="shape shape-light"></div>
      <div class="dots"></div>

      <img class="student student-1" src="https://images.unsplash.com/photo-1509062522246-3755977927d7?q=80&w=600&auto=format&fit=crop" alt="Student writing">
      <img class="student student-2" src="https://images.unsplash.com/photo-1544717305-2782549b5136?q=80&w=700&auto=format&fit=crop" alt="Student smiling">
      <img class="student student-3" src="https://images.unsplash.com/photo-1503676382389-4809596d5290?q=80&w=600&auto=format&fit=crop" alt="Students using tablets">
    </div>

    <div class="hero-text">
      <h1>For every student,<br>every classroom.<br>Real results.</h1>
      <div class="underline"></div>

      <p>
        We’re a nonprofit with the mission to provide a free, world-class
        education for anyone, anywhere.
      </p>

      <div class="hero-buttons">
        <a href="#">Learners</a>
        <a href="#">Teachers</a>
        <a href="#">Districts</a>
        <a href="#">Parents</a>
      </div>
    </div>
  </main>
</body>
</html>
